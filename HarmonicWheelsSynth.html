<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonic Gear Synthesizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #e8e8e8;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 12px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    text-align: center;
    font-weight: 300;
    letter-spacing: 3px;
    margin-bottom: 10px;
    color: #f0c060;
    font-size: clamp(18px, 4vw, 26px);
  }
  /* New prominent instruction banner at the TOP */
  .instruction {
    text-align: center;
    margin: 0 auto 16px;
    padding: 12px 18px;
    max-width: 700px;
    background: linear-gradient(180deg, rgba(240,192,96,0.18), rgba(240,192,96,0.06));
    border: 1.5px solid rgba(240,192,96,0.55);
    border-radius: 10px;
    color: #ffd980;
    font-size: clamp(16px, 4.2vw, 20px);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(240,192,96,0.5);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 0 14px rgba(240,192,96,0.08);
  }
  /* Canvas wrapper centers the canvas without forcing it to stretch */
  .canvas-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: auto;
    padding: 0 4px;
  }
  #gearbox {
    display: block;
    background: radial-gradient(ellipse at center, #2a2a3e 0%, #0f0f1a 100%);
    border: 2px solid #444;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.5);
    touch-action: manipulation;
    /* CRITICAL: do NOT use max-width:100% with height:auto, which causes oval distortion.
       The script sets exact CSS width/height in px to keep aspect ratio. */
  }
  .panel {
    max-width: 1100px;
    margin: 16px auto;
    background: rgba(0,0,0,0.4);
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .master-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .master-ctrl label {
    font-size: 13px;
    color: #f0c060;
    letter-spacing: 1px;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 240px;
    max-width: 60vw;
    height: 6px;
    background: linear-gradient(to right, #444, #888);
    border-radius: 3px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: #f0c060;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(240,192,96,0.7);
  }
  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px;
    background: #f0c060;
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .value-display {
    font-family: 'Consolas', monospace;
    background: #000;
    color: #0f0;
    padding: 6px 12px;
    border-radius: 4px;
    min-width: 110px;
    text-align: center;
    border: 1px solid #0a0;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .value-display.editable:hover {
    background: #001100;
    border-color: #0f0;
    box-shadow: 0 0 8px rgba(0,255,0,0.4);
  }
  .freq-input {
    font-family: 'Consolas', monospace;
    background: #001a00;
    color: #0f0;
    padding: 6px 12px;
    border-radius: 4px;
    min-width: 110px;
    width: 110px;
    text-align: center;
    border: 1px solid #0f0;
    font-size: 14px;
    outline: none;
    box-shadow: 0 0 10px rgba(0,255,0,0.5);
  }
  .value-display.readonly { cursor: default; }
  button {
    background: linear-gradient(180deg, #444, #222);
    color: #0f0;
    border: 1px solid #666;
    padding: 10px 22px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 1px;
    font-size: 13px;
    font-weight: bold;
  }
  button:hover { background: linear-gradient(180deg, #555, #333); }
  .vol-panel {
    max-width: 1100px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    padding: 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid #333;
    border-radius: 10px;
  }
  .vol-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }
  .vol-slot .num { font-size: 11px; color: #888; }
  .vol-slot .freq {
    font-size: 9px;
    color: #0a0;
    font-family: monospace;
    text-align: center;
    white-space: nowrap;
  }
  .vol-slot input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 4px;
    transform: rotate(-90deg);
    margin: 30px 0;
  }
  .vol-slot.active .num { color: #f0c060; font-weight: bold; }
  .credits {
    text-align: center;
    color: #b89860;
    opacity: 0.75;
    font-size: 12px;
    letter-spacing: 1.5px;
    margin: 20px auto 30px;
    font-style: italic;
    user-select: text;
  }
  @media (max-width: 600px) {
    .vol-panel { grid-template-columns: repeat(5, 1fr); }
    .panel { padding: 10px; gap: 10px; }
  }
</style>
</head>
<body>

<h1>HARMONIC GEAR SYNTHESIZER</h1>

<!-- Prominent instruction at the TOP, replacing the old on-canvas message -->
<div class="instruction">Tap on the wheel to sound.</div>

<div class="canvas-wrap">
  <canvas id="gearbox"></canvas>
</div>

<div class="panel">
  <div class="master-ctrl">
    <label>FUNDAMENTAL</label>
    <input type="range" id="freq" min="0" max="20" step="0.001" value="0.02">
    <div class="value-display editable" id="freqVal" title="Click to type a value">0.020 Hz</div>
  </div>
  <div class="master-ctrl">
    <label>BASE TONE</label>
    <div class="value-display readonly" id="toneVal">0.32 Hz</div>
  </div>
  <button id="powerBtn">POWER OFF</button>
</div>

<div class="vol-panel" id="volPanel"></div>

<div class="credits">Developed by Leonardo Fuks.</div>

<script>
(function() {
  'use strict';

  // ============ CONFIG ============
  const NUM_DISCS = 10;
  const NUM_UNDULATIONS = 16;

  const BASE_RADIUS = 75;
  const DISC_RADIUS = BASE_RADIUS * 1.10 * 0.90; // ≈ 74.25
  const DISC_GAP    = 14;
  const ROW_OVERLAP = DISC_RADIUS * 0.55;
  const LABEL_PAD   = 22;
  const SIDE_PAD    = 36;

  const COL_STEP = (DISC_RADIUS * 2) + DISC_GAP;
  const HALF_STEP = COL_STEP / 2;
  const NUM_COLS_BOTTOM = 5;
  const CANVAS_W = SIDE_PAD * 2 + (NUM_COLS_BOTTOM - 1) * COL_STEP + HALF_STEP + DISC_RADIUS * 2;
  const ROW_VERTICAL_DISTANCE = (DISC_RADIUS * 2) - ROW_OVERLAP;
  const CANVAS_H = LABEL_PAD * 2 + DISC_RADIUS * 2 + ROW_VERTICAL_DISTANCE;
  const ASPECT = CANVAS_W / CANVAS_H;

  // Disc positions
  const positions = [];
  const topY    = LABEL_PAD + DISC_RADIUS;
  const bottomY = topY + ROW_VERTICAL_DISTANCE;
  for (let h = 1; h <= NUM_DISCS; h++) {
    if (h % 2 === 1) {
      const i = (h - 1) / 2;
      positions.push({
        x: SIDE_PAD + DISC_RADIUS + i * COL_STEP,
        y: bottomY,
        num: h
      });
    } else {
      const i = (h - 2) / 2;
      positions.push({
        x: SIDE_PAD + DISC_RADIUS + HALF_STEP + i * COL_STEP,
        y: topY,
        num: h
      });
    }
  }

  // ============ CANVAS SETUP ============
  const canvas = document.getElementById('gearbox');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 3);

  // The internal drawing buffer never changes — discs are always drawn perfectly round.
  canvas.width  = Math.round(CANVAS_W * DPR);
  canvas.height = Math.round(CANVAS_H * DPR);
  ctx.scale(DPR, DPR);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // CSS size is set with an EXACT aspect ratio so the rendered image is never stretched.
  function applyCanvasCssSize() {
    const wrap = canvas.parentElement;
    const availW = wrap.clientWidth - 2; // small safety margin
    // Fit by width but preserve aspect ratio exactly:
    let cssW = Math.min(CANVAS_W, availW);
    let cssH = cssW / ASPECT;
    canvas.style.width  = cssW + 'px';
    canvas.style.height = cssH + 'px';
  }
  applyCanvasCssSize();
  window.addEventListener('resize', applyCanvasCssSize);
  window.addEventListener('orientationchange', applyCanvasCssSize);

  // ============ PRE-RENDER DISC BITMAP ============
  function buildDiscBitmap(radius) {
    const size = Math.ceil(radius * 2 * DPR * 1.05);
    const off = document.createElement('canvas');
    off.width = size;
    off.height = size;
    const octx = off.getContext('2d');
    octx.imageSmoothingEnabled = true;
    octx.imageSmoothingQuality = 'high';
    octx.translate(size / 2, size / 2);

    octx.save();
    octx.beginPath();
    octx.arc(0, 0, radius * DPR, 0, Math.PI * 2);
    octx.clip();

    const segments = NUM_UNDULATIONS * 60;
    const r = radius * DPR;
    for (let s = 0; s < segments; s++) {
      const a0 = (s / segments) * Math.PI * 2;
      const a1 = ((s + 1) / segments) * Math.PI * 2;
      const phase = (s / segments) * NUM_UNDULATIONS * Math.PI * 2;
      const brightness = (Math.sin(phase) + 1) / 2;
      const v = Math.floor(brightness * 255);
      octx.beginPath();
      octx.moveTo(0, 0);
      octx.arc(0, 0, r, a0, a1 + 0.003);
      octx.closePath();
      octx.fillStyle = 'rgb(' + v + ',' + v + ',' + v + ')';
      octx.fill();
    }

    octx.beginPath();
    octx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
    const hubGrad = octx.createRadialGradient(-2, -2, 0, 0, 0, r * 0.12);
    hubGrad.addColorStop(0, '#888');
    hubGrad.addColorStop(1, '#222');
    octx.fillStyle = hubGrad;
    octx.fill();
    octx.strokeStyle = '#000';
    octx.lineWidth = 1.5 * DPR;
    octx.stroke();

    octx.restore();
    return off;
  }
  const DISC_BITMAP = buildDiscBitmap(DISC_RADIUS);

  // ============ DISC STATE ============
  const discs = [];
  for (let i = 0; i < NUM_DISCS; i++) {
    discs.push({
      active: i === 0,
      volume: 0.5,
      angle: 0,
      osc: null,
      gain: null
    });
  }

  // ============ AUDIO (lazy init on first gesture) ============
  let audioCtx = null;
  let masterGain = null;
  let powered = true;       // default state: POWER ON
  let audioReady = false;

  function initAudio() {
    if (audioReady) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = powered ? 0.6 : 0;
      masterGain.connect(audioCtx.destination);

      for (let i = 0; i < NUM_DISCS; i++) {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        const g = audioCtx.createGain();
        g.gain.value = 0;
        osc.connect(g);
        g.connect(masterGain);
        osc.start();
        discs[i].osc = osc;
        discs[i].gain = g;
      }
      audioReady = true;
      updateAudio();
    } catch (e) {
      console.warn('Audio init deferred:', e);
    }
  }

  function unlockAudio() {
    if (!audioReady) initAudio();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(function(){});
    }
  }
  window.addEventListener('click',      unlockAudio, { passive: true });
  window.addEventListener('touchstart', unlockAudio, { passive: true });
  window.addEventListener('keydown',    unlockAudio, { passive: true });

  function updateAudio() {
    const fundamentalHz = baseFreq * NUM_UNDULATIONS;
    const toneEl = document.getElementById('toneVal');
    if (toneEl) toneEl.textContent = fundamentalHz.toFixed(2) + ' Hz';
    if (!audioReady || !audioCtx) { updateVolUI(); return; }
    if (masterGain) {
      masterGain.gain.setTargetAtTime(powered ? 0.6 : 0, audioCtx.currentTime, 0.05);
    }
    for (let i = 0; i < NUM_DISCS; i++) {
      const harmonic = i + 1;
      const freq = fundamentalHz * harmonic;
      if (discs[i].osc) {
        discs[i].osc.frequency.setTargetAtTime(Math.max(0.0001, freq), audioCtx.currentTime, 0.02);
      }
      const targetGain = (powered && discs[i].active) ? (discs[i].volume * 0.15) : 0;
      if (discs[i].gain) {
        discs[i].gain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.03);
      }
    }
    updateVolUI();
  }

  // ============ DRAW DISC ============
  function drawDisc(x, y, angle, active, harmonic) {
    ctx.save();
    ctx.translate(x, y);

    ctx.beginPath();
    ctx.arc(0, 0, DISC_RADIUS + 5, 0, Math.PI * 2);
    const housing = ctx.createRadialGradient(0, 0, DISC_RADIUS, 0, 0, DISC_RADIUS + 5);
    housing.addColorStop(0, '#3a3a3a');
    housing.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = housing;
    ctx.fill();

    ctx.save();
    ctx.rotate(angle);
    const bmpSize = DISC_BITMAP.width / DPR;
    ctx.drawImage(DISC_BITMAP, -bmpSize / 2, -bmpSize / 2, bmpSize, bmpSize);
    ctx.restore();

    ctx.beginPath();
    ctx.arc(0, 0, DISC_RADIUS, 0, Math.PI * 2);
    ctx.lineWidth = 3;
    ctx.strokeStyle = active ? '#f0c060' : '#222';
    if (active) {
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#f0c060';
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = active ? '#f0c060' : '#888';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labelY = (harmonic % 2 === 0) ? -DISC_RADIUS - 11 : DISC_RADIUS + 11;
    ctx.fillText(harmonic, 0, labelY);

    ctx.restore();
  }

  // ============ MAIN LOOP ============
  let baseFreq = 0.02;
  let lastTime = performance.now();

  function loop(now) {
    const dt = Math.min(0.1, (now - lastTime) / 1000);
    lastTime = now;

    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // dashed gear-chain
    ctx.strokeStyle = 'rgba(120,120,140,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    for (let i = 0; i < positions.length - 1; i++) {
      ctx.beginPath();
      ctx.moveTo(positions[i].x, positions[i].y);
      ctx.lineTo(positions[i + 1].x, positions[i + 1].y);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    const twoPi = Math.PI * 2;
    for (let i = 0; i < NUM_DISCS; i++) {
      const harmonic = i + 1;
      const dir = (harmonic % 2 === 0) ? -1 : 1;
      discs[i].angle += dir * baseFreq * harmonic * twoPi * dt;
      if (discs[i].angle > twoPi)  discs[i].angle -= twoPi;
      if (discs[i].angle < -twoPi) discs[i].angle += twoPi;
    }

    for (let i = 0; i < NUM_DISCS; i++) {
      const p = positions[i];
      drawDisc(p.x, p.y, discs[i].angle, discs[i].active, p.num);
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ============ DISC CLICK ============
  function hitTest(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    const mx = (clientX - rect.left) * scaleX;
    const my = (clientY - rect.top) * scaleY;
    for (let i = 0; i < NUM_DISCS; i++) {
      const p = positions[i];
      if (Math.hypot(mx - p.x, my - p.y) < DISC_RADIUS) return i;
    }
    return -1;
  }
  canvas.addEventListener('click', function(e) {
    const i = hitTest(e.clientX, e.clientY);
    if (i < 0) return;
    if (i === 0) return; // disc 1 always active
    discs[i].active = !discs[i].active;
    updateAudio();
  });

  // ============ FREQUENCY: SLIDER + CLICK-TO-EDIT ============
  const freqSlider = document.getElementById('freq');
  const freqVal = document.getElementById('freqVal');

  function setBaseFreq(v) {
    v = parseFloat(v);
    if (isNaN(v)) return;
    v = Math.max(0, Math.min(20, v));
    baseFreq = v;
    freqSlider.value = v;
    freqVal.textContent = v.toFixed(3) + ' Hz';
    updateAudio();
  }

  freqSlider.addEventListener('input', function() { setBaseFreq(freqSlider.value); });

  freqVal.addEventListener('click', function() {
    const input = document.createElement('input');
    input.type = 'number';
    input.inputMode = 'decimal';
    input.step = '0.001';
    input.min = '0';
    input.max = '20';
    input.value = baseFreq.toFixed(3);
    input.className = 'freq-input';

    const parent = freqVal.parentNode;
    parent.replaceChild(input, freqVal);
    input.focus();
    input.select();

    const commit = function() {
      setBaseFreq(input.value);
      if (input.parentNode) parent.replaceChild(freqVal, input);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      else if (e.key === 'Escape') {
        if (input.parentNode) parent.replaceChild(freqVal, input);
      }
    });
  });

  // ============ POWER BUTTON (default: ON) ============
  const powerBtn = document.getElementById('powerBtn');
  function refreshPowerUI() {
    if (powered) {
      powerBtn.textContent = 'POWER OFF';
      powerBtn.style.color = '#0f0';
    } else {
      powerBtn.textContent = 'POWER ON';
      powerBtn.style.color = '#f0c060';
    }
  }
  refreshPowerUI();

  powerBtn.addEventListener('click', function() {
    if (!audioReady) initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function(){});
    powered = !powered;
    refreshPowerUI();
    updateAudio();
  });

  // ============ VOLUME PANEL ============
  const volPanel = document.getElementById('volPanel');
  function buildVolUI() {
    for (let i = 0; i < NUM_DISCS; i++) {
      const slot = document.createElement('div');
      slot.className = 'vol-slot' + (discs[i].active ? ' active' : '');
      slot.dataset.idx = i;
      slot.innerHTML =
        '<div class="num">H' + (i + 1) + '</div>' +
        '<input type="range" min="0" max="1" step="0.01" value="' + discs[i].volume + '">' +
        '<div class="freq" id="hf' + i + '">' + (baseFreq * NUM_UNDULATIONS * (i + 1)).toFixed(2) + 'Hz</div>';
      const input = slot.querySelector('input');
      input.addEventListener('input', function() {
        discs[i].volume = parseFloat(input.value);
        updateAudio();
      });
      volPanel.appendChild(slot);
    }
  }
  function updateVolUI() {
    const slots = document.querySelectorAll('.vol-slot');
    for (let i = 0; i < slots.length; i++) {
      slots[i].classList.toggle('active', discs[i].active);
      const hf = document.getElementById('hf' + i);
      if (hf) hf.textContent = (baseFreq * NUM_UNDULATIONS * (i + 1)).toFixed(2) + 'Hz';
    }
  }
  buildVolUI();
  setBaseFreq(0.02);
})();
</script>
</body>
</html>
