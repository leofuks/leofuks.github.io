<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Virtual Zither — HarpTotal1</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
    background:#2b2b2b; font-family:Georgia, serif; color:#eee; }
  #wrap { height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:flex-start; box-sizing:border-box; padding:6px 10px; }
  h1 { font-weight:normal; margin:4px 0 2px; font-size:clamp(16px,2.5vh,24px); }
  .bar { display:flex; align-items:center; gap:10px; margin:3px 0;
    font-size:clamp(13px,1.9vh,17px); opacity:.92; flex-wrap:wrap; justify-content:center; }
  .bar input[type=range] { width:clamp(140px,28vw,280px); height:26px; }
  .val { min-width:44px; text-align:right; font-variant-numeric:tabular-nums; }
  .keys { font-size:clamp(13px,1.8vh,16px); opacity:.9; }
  .keys b { color:#7ec8e3; }
  /* Botões maiores e tocáveis (mín. ~44px de alvo de toque) */
  .tag { padding:10px 14px; border:1px solid #555; border-radius:8px; cursor:pointer;
    user-select:none; -webkit-tap-highlight-color:transparent;
    min-height:44px; display:inline-flex; align-items:center; justify-content:center;
    font-size:clamp(13px,1.9vh,17px); transition:background .12s, transform .05s; }
  .tag:active { transform:scale(0.95); }
  .tag.on { background:#7ec8e3; color:#111; border-color:#7ec8e3; }
  canvas { background:#fff; border:4px solid #000; cursor:crosshair;
    touch-action:none; max-width:100%; max-height:100%; }
</style>
</head>
<body>
<div id="wrap">
<h1>Virtual Zither — HarpTotal1</h1>
<div class="bar">
<label for="sens">Sensitivity</label>
<span style="opacity:.6">less</span>
<input id="sens" type="range" min="1" max="12" step="0.1" value="6" />
<span style="opacity:.6">more</span>
<span class="val" id="sensVal">6.0×</span>
</div>
<div class="bar">
<label>Modo de repetição:</label>
<span class="tag" id="repeatMode">Nota Única (T)</span>
<span style="opacity:.6">clique, toque ou tecle T</span>
</div>
<div class="bar keys">
<span>Transpose:</span>
<span class="tag" id="kA">A / Space = Base</span>
<span class="tag" id="kS">S = +1</span>
<span class="tag" id="kD">D = +2</span>
<span class="tag" id="kF">F = +3</span>
<span class="tag" id="kG">G = +4</span>
<span class="tag" id="kH">H = +5</span>
<span class="tag" id="kJ">J = +6</span>
<span class="tag" id="kK">K = +7</span>
<span class="tag" id="kL">L = +8</span>
<span class="tag" id="kQ">Q = +9</span>
<span class="tag" id="kW">W = +10</span>
<span class="tag" id="kE">E = +11</span>
<span class="tag" id="kR">R = +12</span>
</div>
<canvas id="zither"></canvas>
</div>
<script>
(()=> {
  const canvas = document.getElementById('zither');
  const ctx = canvas.getContext('2d');
  const sensInput = document.getElementById('sens');
  const sensVal = document.getElementById('sensVal');

  const W = 760, H = 460;

  // --- Note map: literal from HarpTotal1.jpg ---
  const rows = [
    ['Cb','C', 'C', 'C', 'C#'],   // bottom
    ['Db','Db','D', 'D', 'D#'],
    ['Eb','E', 'E', 'E', 'E#'],
    ['Fb','F', 'F', 'F#','F#'],
    ['Gb','Gb','G', 'G#','G#'],
    ['Ab','Ab','A', 'A#','A#'],
    ['Bb','Bb','B', 'B#','B#'],
    ['Cb','Cb','C', 'C', 'C#'],   // top
  ];
  const NUM_REGIONS = 5;
  const NUM_ROWS = rows.length; //8 spaces
  const NUM_STRINGS = NUM_ROWS + 1; //9 strings

  // Octave per row (bottom-up), baseline for playing
  const rowOctave = [4,4,4,4,4,5,5,5];

  // ---- Per-LINE octave offset (in octaves), indexed by string line 0..8 ----
  const lineOctaveOffset = [
    0,0,0,0,0,-1,-1,0,+1,
  ];

  // Enharmonic to semitone offset from C
  const SEMI = {
    'Cb':-1,'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'E#':5,'Fb':4,
    'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'B#':12
  };

  function freqOf(label, octave, extraSemis) {
    const semisFromC4 = SEMI[label] + (octave - 4)*12 + extraSemis;
    return 440 * Math.pow(2, (semisFromC4 - 9)/12);
  }

  // --- Transpose control: integer semitones ---
  let transpose = 0;
  const tags = {
    A:'kA', S:'kS', D:'kD', F:'kF', G:'kG',
    H:'kH', J:'kJ', K:'kK', L:'kL', Q:'kQ', W:'kW', E:'kE', R:'kR'
  };
  const keyMap = {
    'a': {n:0,  id:'kA'},
    ' ': {n:0,  id:'kA'},
    's': {n:1,  id:'kS'},
    'd': {n:2,  id:'kD'},
    'f': {n:3,  id:'kF'},
    'g': {n:4,  id:'kG'},
    'h': {n:5,  id:'kH'},
    'j': {n:6,  id:'kJ'},
    'k': {n:7,  id:'kK'},
    'l': {n:8,  id:'kL'},
    'q': {n:9,  id:'kQ'},
    'w': {n:10, id:'kW'},
    'e': {n:11, id:'kE'},
    'r': {n:12, id:'kR'},
  };

  function setTranspose(val, keyId) {
    transpose = val;
    Object.values(tags).forEach(id => document.getElementById(id).classList.remove('on'));
    if (keyId) document.getElementById(keyId).classList.add('on');
    draw(activeString, activeRegion);
  }

  // Tornar os botões de transpose clicáveis/tocáveis
  Object.entries(keyMap).forEach(([key, m]) => {
    if (key === ' ') return; // espaço já coberto pelo botão 'A'
    const el = document.getElementById(m.id);
    if (!el) return;
    el.addEventListener('click', () => setTranspose(m.n, m.id));
  });

  // --- Toggle: modo de repetição de notas ---
  let tremoloMode = false;
  const repeatBtn = document.getElementById('repeatMode');

  function updateRepeatModeUI() {
    if (tremoloMode) {
      repeatBtn.textContent = 'Trêmolo (T)';
      repeatBtn.classList.add('on');
    } else {
      repeatBtn.textContent = 'Nota Única (T)';
      repeatBtn.classList.remove('on');
    }
  }
  function toggleTremoloMode() {
    tremoloMode = !tremoloMode;
    updateRepeatModeUI();
    if (!tremoloMode) stopTremolo();
  }
  repeatBtn.addEventListener('click', toggleTremoloMode);
  updateRepeatModeUI();

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 't') { toggleTremoloMode(); return; }
    const m = keyMap[k];
    if (m) {
      if (k === ' ') e.preventDefault();
      setTranspose(m.n, m.id);
    }
  });
  document.getElementById('kA').classList.add('on');

  // --- Web Audio context and pluck sound ---
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state==='suspended') audioCtx.resume();
  }
  function pluck(freq) {
    ensureAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type='sawtooth'; osc.frequency.value=freq;
    const osc2=audioCtx.createOscillator();
    osc2.type='triangle'; osc2.frequency.value=freq*2.001;
    const g2=audioCtx.createGain(); g2.gain.value=0.22;
    const filt=audioCtx.createBiquadFilter(); filt.type='lowpass';
    filt.frequency.setValueAtTime(Math.min(freq*8,8000), now);
    filt.frequency.exponentialRampToValueAtTime(Math.max(freq*1.5,200), now+0.5);
    const env = audioCtx.createGain(); env.gain.setValueAtTime(0.0001, now);
    env.gain.exponentialRampToValueAtTime(0.5, now+0.004);
    env.gain.exponentialRampToValueAtTime(0.0001, now+0.55);
    osc.connect(env); osc2.connect(g2).connect(env);
    env.connect(filt).connect(audioCtx.destination);
    osc.start(now); osc2.start(now);
    osc.stop(now+0.6); osc2.stop(now+0.6);
  }

  // Layout settings:
  const PAD=70, TOP=50, BOTTOM=400;
  const stringColors=['#e8000b','#f08020','#ffe600','#7bc043',
    '#7ec8e3','#2030d0','#9b30b0','#e8000b','#e8000b'];
  const strings=[];
  for (let i=0; i< NUM_STRINGS; i++) strings.push(BOTTOM - (BOTTOM-TOP)*i/(NUM_STRINGS-1));
  const SLANT=70;
  const regionWidth = (W - 2*PAD) / NUM_REGIONS;

  // ---- Botões de notas (hit-test no canvas) ----
  // Tamanho do alvo clicável de cada rótulo de nota
  const NOTE_BTN_W = regionWidth * 0.82;
  const NOTE_BTN_H = ((BOTTOM-TOP)/(NUM_STRINGS-1)) * 0.82;

  // Calcula o centro (cx, cy) de um rótulo de nota dado [linha, coluna]
  function noteLabelCenter(r, c) {
    const yLabel = (strings[r]+strings[r+1])/2;
    const t = (BOTTOM - yLabel)/(BOTTOM - TOP);
    const cx = PAD + c*regionWidth + regionWidth/2 - t*SLANT;
    return { cx, cy: yLabel };
  }

  // Verifica se (x,y) está dentro do "botão" de alguma nota; retorna {r,c} ou null
  function noteButtonAt(x, y) {
    for (let r=0; r<NUM_ROWS; r++) {
      for (let c=0; c<NUM_REGIONS; c++) {
        const { cx, cy } = noteLabelCenter(r, c);
        if (Math.abs(x-cx) <= NOTE_BTN_W/2 && Math.abs(y-cy) <= NOTE_BTN_H/2) {
          return { r, c };
        }
      }
    }
    return null;
  }

  function regionAt(x,y) {
    const t = (BOTTOM - y)/(BOTTOM -TOP);
    const adjX = x + t*SLANT;
    let idx = Math.floor((adjX - PAD)/regionWidth);
    return Math.max(0, Math.min(NUM_REGIONS-1, idx));
  }
  function rowForString(sidx) {
    return Math.max(0, Math.min(NUM_ROWS-1, sidx));
  }
  function noteForRowCol(r, c) {
    const label = rows[r][c];
    const oct = rowOctave[r];
    // usa a linha inferior do espaço como referência de octave de linha
    const lineShift = (lineOctaveOffset[r] || 0) * 12;
    return { label, freq: freqOf(label, oct, transpose + lineShift) };
  }
  function noteFor(stringIdx, regionIdx) {
    const r = rowForString(stringIdx);
    const label = rows[r][regionIdx];
    const oct = rowOctave[r];
    const lineShift = (lineOctaveOffset[stringIdx] || 0) * 12;
    return { label, freq: freqOf(label, oct, transpose + lineShift) };
  }

  // --- Sensitivity Movement Model ---
  let sensitivity = parseFloat(sensInput.value);
  let pickX=W/2, pickY=(TOP+BOTTOM)/2;
  let lastRawY = null;
  let pointerActive = false;

  function stringAtPick() {
    const tol=16; let best=-1, bestD=Infinity;
    for (let i=0; i<strings.length; i++) {
      const d = Math.abs(strings[i]-pickY);
      if (d<bestD) { bestD=d; best=i; }
    }
    return bestD<=tol ? best : -1;
  }

  // --- Tremolo handling ---
  let tremTimer=null;
  let activeString=-1, activeRegion=-1;
  let lastTremTime=0;
  // Destaque do botão de nota tocado (feedback visual)
  let flashNote=null, flashUntil=0;

  function tremoloRateAt(x,y,regIdx) {
    const t = (BOTTOM - y)/(BOTTOM - TOP);
    const adjX= x + t*SLANT;
    const within = (adjX - PAD - regIdx*regionWidth)/regionWidth;
    const clamped= Math.max(0, Math.min(1, within));
    return 3 + clamped*(8-3); // 3-8 Hz ramp
  }
  function tremoloLoop(ts) {
    if (activeString===-1) { tremTimer=null; return; }
    const rate = tremoloRateAt(pickX,pickY,activeRegion);
    const interval= 1000/rate;
    if (ts-lastTremTime>=interval) {
      lastTremTime=ts;
      const { freq }= noteFor(activeString, activeRegion);
      pluck(freq);
    }
    tremTimer= requestAnimationFrame(tremoloLoop);
  }
  function startTremolo() {
    if (!tremTimer) { lastTremTime=0; tremTimer= requestAnimationFrame(tremoloLoop); }
  }
  function stopTremolo() {
    if (tremTimer) cancelAnimationFrame(tremTimer);
    tremTimer=null; activeString=-1; activeRegion=-1;
  }

  // --- Drawing function ---
  function draw(active=-1, activeReg=-1) {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.lineWidth=4; ctx.strokeStyle='#000';
    ctx.strokeRect(2,2,W-4,H-4);

    // dotted region divider lines
    ctx.save(); ctx.setLineDash([4,5]); ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5;
    for (let i=1; i<NUM_REGIONS; i++) {
      const xB= PAD + i*regionWidth;
      ctx.beginPath(); ctx.moveTo(xB, BOTTOM+10);
      ctx.lineTo(xB - SLANT, TOP -28); ctx.stroke();
    }
    ctx.restore();

    // strings
    for (let i=0; i< strings.length; i++) {
      const y=strings[i];
      ctx.strokeStyle=stringColors[i]; ctx.lineWidth= (i===active)?6:3;
      ctx.beginPath(); ctx.moveTo(PAD,y); ctx.lineTo(W-PAD,y); ctx.stroke();
    }

    // --- NOTE BUTTONS: fundo arredondado + letra maior ---
    ctx.textBaseline='middle'; ctx.textAlign='center';
    const now = performance.now();
    for (let r=0; r<NUM_ROWS; r++) {
      for (let c=0; c<NUM_REGIONS; c++) {
        const { cx, cy } = noteLabelCenter(r, c);
        const isActive = (r===rowForString(active) && c===activeReg);
        const isFlash = (flashNote && flashNote.r===r && flashNote.c===c && now < flashUntil);

        // caixa do botão (retângulo arredondado)
        const bw = NOTE_BTN_W, bh = NOTE_BTN_H;
        ctx.beginPath();
        const rad = 8;
        const x0 = cx-bw/2, y0 = cy-bh/2;
        ctx.moveTo(x0+rad, y0);
        ctx.arcTo(x0+bw, y0, x0+bw, y0+bh, rad);
        ctx.arcTo(x0+bw, y0+bh, x0, y0+bh, rad);
        ctx.arcTo(x0, y0+bh, x0, y0, rad);
        ctx.arcTo(x0, y0, x0+bw, y0, rad);
        ctx.closePath();
        ctx.fillStyle = (isActive || isFlash) ? 'rgba(208,0,0,0.14)'
                                              : 'rgba(0,0,0,0.04)';
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = (isActive || isFlash) ? '#d00' : 'rgba(0,0,0,0.18)';
        ctx.stroke();

        // letra (maior)
        const label = labelWithTrans(rows[r][c]);
        ctx.fillStyle = (isActive || isFlash) ? '#d00' : '#000';
        ctx.font = (isActive || isFlash) ? 'bold 26px Georgia' : '24px Georgia';
        ctx.fillText(label, cx, cy);
      }
    }
    ctx.textAlign='left';

    // pick indicator
    if (pointerActive) {
      ctx.fillStyle='rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.arc(pickX,pickY,7,0,Math.PI*2); ctx.fill();
    }
  }

  function labelWithTrans(label) {
    if (transpose===0) return label;
    const base= SEMI[label];
    const n= (((base + transpose)%12)+12)%12;
    const names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    return names[n];
  }

  // Dispara uma nota a partir do botão clicado/tocado (feedback + som)
  function triggerNoteButton(r, c) {
    const { freq } = noteForRowCol(r, c);
    pluck(freq);
    flashNote = { r, c };
    flashUntil = performance.now() + 220;
    draw(activeString, activeRegion);
    setTimeout(() => draw(activeString, activeRegion), 230);
  }

  // Interaction (modo "arco/dedilhado" pelo movimento)
  function onMove(rawX, rawY) {
    pickX=rawX;
    if (lastRawY===null) pickY=rawY;
    else pickY += (rawY - lastRawY)*sensitivity;
    lastRawY=rawY;
    pickY=Math.max(TOP-10, Math.min(BOTTOM+10,pickY));
    const sIdx=stringAtPick();
    if (sIdx===-1) { stopTremolo(); draw(); return; }
    const rIdx=regionAt(pickX,pickY);

    const changed = (sIdx!==activeString || rIdx!==activeRegion);

    if (tremoloMode) {
      if (changed) { activeString=sIdx; activeRegion=rIdx; lastTremTime=0; }
      startTremolo();
    } else {
      if (changed) {
        activeString=sIdx; activeRegion=rIdx;
        const { freq }= noteFor(sIdx, rIdx);
        pluck(freq);
      }
    }
    draw(sIdx,rIdx);
  }

  function pos(e) {
    const r=canvas.getBoundingClientRect();
    const t=e.touches? e.touches[0]: e;
    return { x:(t.clientX - r.left)*(W/r.width), y:(t.clientY - r.top)*(H/r.height) };
  }

  // --- Mouse: distingue clique em botão de nota vs. dedilhado ---
  canvas.addEventListener('mousedown', e => {
    ensureAudio();
    const p=pos(e);
    const btn = noteButtonAt(p.x, p.y);
    if (btn) { triggerNoteButton(btn.r, btn.c); return; }
    pointerActive=true; lastRawY=null; onMove(p.x,p.y);
  });
  canvas.addEventListener('mousemove', e => {
    const p=pos(e); pointerActive=true; onMove(p.x,p.y);
  });
  canvas.addEventListener('mouseleave', ()=> { pointerActive=false; lastRawY=null; stopTremolo(); draw(); });

  // --- Touch: toque em botão de nota dispara a nota; arrasto = dedilhado ---
  let touchStartBtn = null;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault(); ensureAudio();
    const p=pos(e);
    touchStartBtn = noteButtonAt(p.x, p.y);
    if (touchStartBtn) { return; } // espera o touchend para confirmar o "tap"
    pointerActive=true; lastRawY=null; onMove(p.x,p.y);
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const p=pos(e);
    // se começou em um botão mas o dedo se moveu, vira dedilhado
    if (touchStartBtn) {
      const still = noteButtonAt(p.x, p.y);
      if (!still || still.r!==touchStartBtn.r || still.c!==touchStartBtn.c) {
        touchStartBtn = null;
        pointerActive=true; lastRawY=null;
      } else {
        return;
      }
    }
    onMove(p.x,p.y);
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    if (touchStartBtn) {
      triggerNoteButton(touchStartBtn.r, touchStartBtn.c);
      touchStartBtn = null;
    }
    pointerActive=false; lastRawY=null; stopTremolo(); draw();
  });

  // Sensitivity slider
  sensInput.addEventListener('input', () => {
    sensitivity=parseFloat(sensInput.value);
    sensVal.textContent= sensitivity.toFixed(1)+'×';
  });
  sensInput.value=sensitivity; sensVal.textContent=sensitivity.toFixed(1)+'×';

  // Resize
  function resize() {
    const wrap=document.getElementById('wrap');
    const st=getComputedStyle(wrap);
    const padX=parseFloat(st.paddingLeft)+parseFloat(st.paddingRight);
    const others = document.querySelector('h1').offsetHeight+
      Array.from(document.querySelectorAll('.bar')).reduce((a,b)=>a+b.offsetHeight,0)+30;
    const availW= window.innerWidth - padX - 8;
    const availH= window.innerHeight - others - 16;
    const scale= Math.min(availW/W, availH/H);
    canvas.style.width= (W*scale)+'px';
    canvas.style.height= (H*scale)+'px';
    canvas.width=W; canvas.height=H;
    draw(activeString, activeRegion);
  }
  window.addEventListener('resize', resize);
  resize();
})();
</script>
</body>
</html>
